spring:
  application:
    name: Projeto API

  datasource:
    url: jdbc:postgresql://localhost:5433/livraria
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect